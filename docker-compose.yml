services:
  backend:
    build:
      context: ./backend
    container_name: movie-backend
    environment:
      MONGO_DATABASE: ${MONGO_DATABASE}
      MONGO_USER: ${MONGO_USER}
      MONGO_PASSWORD: ${MONGO_PASSWORD}
      MONGO_CLUSTER: ${MONGO_CLUSTER}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: movie-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"