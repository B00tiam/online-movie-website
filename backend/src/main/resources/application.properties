spring.application.name=backend

# spring.security.user.name=admin
# spring.security.user.password=admin123

spring.data.mongodb.database=${MONGO_DATABASE}
spring.data.mongodb.uri=mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_CLUSTER}

# JWT setting
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=${JWT_EXPIRE}

# Admin setting (set a default admin user)
app.admin.username=${INIT_ADMIN_USERNAME}
app.admin.email=${INIT_ADMIN_EMAIL}
app.admin.password=${INIT_ADMIN_PASSWORD}

# AI setting (Gemini)
ai.base-url=${AI_BASE_URL}
ai.api-key=${AI_API_KEY}
ai.model=${AI_MODEL}

# INFO & DEBUG logging
# logging.level.org.springframework.security=INFO
# logging.level.org.springframework.security=DEBUG

# TMDB API setting
tmdb.api.key=${TMDB_API_KEY}
tmdb.api.baseUrl=https://api.themoviedb.org/3
tmdb.image.baseW500=https://image.tmdb.org/t/p/w500
tmdb.image.baseOriginal=https://image.tmdb.org/t/p/original
